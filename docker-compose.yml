services:
  db:
    image: postgres:16-alpine
    container_name: ovgs-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ovgs
      POSTGRES_PASSWORD: ovgs
      POSTGRES_DB: ovgs
    ports:
      - "5432:5432"
    volumes:
      - ovgs-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ovgs -d ovgs"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    container_name: ovgs-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ovgs:ovgs@db:5432/ovgs?schema=public
      PORT: 3333
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: info
    ports:
      - "3333:3333"

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3333
    container_name: ovgs-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3333
    ports:
      - "3000:3000"

volumes:
  ovgs-db-data:
